<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Streak">
<title>Streak</title>
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#000;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#fff;overscroll-behavior:none}
  body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh}

  .status-bar{background:#000;display:flex;justify-content:space-between;align-items:center;padding:12px 20px 4px;height:44px;flex-shrink:0}
  .status-time{color:#fff;font-size:15px;font-weight:600}
  .status-icons{display:flex;gap:6px;align-items:center}
  .status-icons svg{fill:#fff}

  .app-header{background:#000;padding:12px 20px 14px;border-bottom:0.5px solid #1e1e1e;flex-shrink:0}
  .app-header-title{color:#fff;font-size:18px;font-weight:600}

  .app-body{padding:20px 16px 32px;background:#000;flex:1;overflow-y:auto}

  .splash-screen{text-align:center;padding:60px 20px 40px}
  .splash-icon-big{font-size:64px;display:block;margin-bottom:20px}
  .splash-title{color:#fff;font-size:26px;font-weight:600;margin-bottom:10px}
  .splash-sub{color:#666;font-size:15px;line-height:1.6;margin-bottom:40px}

  .sbtn{display:block;width:100%;padding:16px;border-radius:14px;border:none;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity 0.1s,transform 0.1s;margin-bottom:12px;text-align:center;letter-spacing:0.01em}
  .sbtn:active{transform:scale(0.97);opacity:0.85}
  .sbtn-white{background:#fff;color:#000}
  .sbtn-grey{background:#1e1e1e;color:#fff}
  .sbtn-red{background:#c0392b;color:#fff}
  .sbtn-locked{background:#111;color:#333;cursor:not-allowed;border:1px solid #1e1e1e}
  .sbtn-locked:active{transform:none;opacity:1}

  .streak-card{background:#111;border-radius:22px;padding:28px 20px;margin-bottom:16px;text-align:center;border:0.5px solid #1e1e1e}
  .streak-icon{font-size:36px;display:block;margin-bottom:10px}
  .streak-big{font-size:72px;font-weight:600;color:#fff;line-height:1}
  .streak-sub{color:#555;font-size:14px;margin-top:6px}
  .started-label{color:#333;font-size:12px;margin-top:12px}

  .status-pill{border-radius:12px;padding:11px 16px;font-size:14px;text-align:center;margin-bottom:14px}
  .pill-ready{background:#0d2e0d;color:#5dca7e;border:0.5px solid #1a5c1a}
  .pill-locked{background:#2e1f00;color:#f0a500;border:0.5px solid #5c3d00}

  .countdown-num{font-size:36px;font-weight:600;color:#fff;text-align:center;margin:4px 0;letter-spacing:0.05em}
  .countdown-lbl{font-size:12px;color:#444;text-align:center;margin-bottom:12px}
  .prog-track{height:4px;background:#1a1a1a;border-radius:2px;margin-bottom:16px;overflow:hidden}
  .prog-fill{height:100%;background:#fff;border-radius:2px;transition:width 1s linear}

  .dots-wrap{margin-bottom:16px}
  .dots-title{color:#444;font-size:12px;margin-bottom:10px;letter-spacing:0.08em;text-transform:uppercase}
  .dots-grid{display:flex;flex-wrap:wrap;gap:5px}
  .dot{width:30px;height:30px;border-radius:8px;background:#111;display:flex;align-items:center;justify-content:center;font-size:10px;color:#333;border:0.5px solid #1e1e1e}
  .dot.done{background:#fff;color:#000;border-color:#fff}

  .divider{border:none;border-top:0.5px solid #1a1a1a;margin:14px 0}

  .confirm-box{background:#111;border:1.5px solid #c0392b;border-radius:16px;padding:16px;margin-bottom:12px}
  .confirm-box p{color:#ccc;font-size:14px;text-align:center;margin-bottom:14px;line-height:1.5}
  .confirm-row{display:flex;gap:10px}
  .confirm-row .sbtn{margin-bottom:0;padding:13px;font-size:15px}

  .home-bar{height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#000}
  .home-pill{width:120px;height:5px;background:#333;border-radius:3px}
</style>
</head>
<body>

<div class="status-bar">
  <span class="status-time" id="clock">9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" viewBox="0 0 15 11"><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4" y="2" width="3" height="9" rx="1"/><rect x="8" y="1" width="3" height="10" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1"/></svg>
    <svg width="15" height="12" viewBox="0 0 14 11"><path d="M7 2.5C9.2 2.5 11.2 3.4 12.6 4.9L14 3.4C12.2 1.3 9.7 0 7 0S1.8 1.3 0 3.4L1.4 4.9C2.8 3.4 4.8 2.5 7 2.5z"/><path d="M7 5.5C8.5 5.5 9.8 6.1 10.8 7.1L12.2 5.6C10.8 4.2 8.9 3.5 7 3.5S3.2 4.2 1.8 5.6L3.2 7.1C4.2 6.1 5.5 5.5 7 5.5z"/><circle cx="7" cy="9.5" r="1.5"/></svg>
    <svg width="24" height="12" viewBox="0 0 22 11"><rect x="0" y="1" width="18" height="9" rx="2.5" stroke="#fff" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="13" height="6" rx="1.5" fill="#fff"/><rect x="19" y="3.5" width="2" height="4" rx="1" fill="#fff"/></svg>
  </div>
</div>

<div class="app-header">
  <div class="app-header-title">Streak</div>
</div>

<div class="app-body">

  <div id="splash-screen" class="splash-screen">
    <span class="splash-icon-big">⚡</span>
    <div class="splash-title">Streak tracker</div>
    <p class="splash-sub">Build a daily habit. Add one every 24 hours from the moment you start.</p>
    <button class="sbtn sbtn-white" id="start-btn">Start</button>
  </div>

  <div id="main-screen" style="display:none">
    <div class="streak-card">
      <span class="streak-icon" id="s-icon">⚡</span>
      <div class="streak-big" id="s-num">0</div>
      <div class="streak-sub">day streak</div>
      <div class="started-label" id="s-started"></div>
    </div>

    <div class="status-pill" id="s-status"></div>

    <div id="s-locked" style="display:none">
      <div class="countdown-num" id="s-countdown">00:00:00</div>
      <div class="countdown-lbl">until you can add again</div>
      <div class="prog-track"><div class="prog-fill" id="s-prog" style="width:0%"></div></div>
    </div>

    <button class="sbtn sbtn-white" id="add-btn">+ Add one</button>

    <div class="dots-wrap">
      <div class="dots-title">Last 30 days</div>
      <div class="dots-grid" id="s-dots"></div>
    </div>

    <div class="divider"></div>

    <div id="confirm-box" style="display:none" class="confirm-box">
      <p>Reset streak? This clears all entries and the timer.</p>
      <div class="confirm-row">
        <button class="sbtn sbtn-grey" id="cancel-btn">Cancel</button>
        <button class="sbtn sbtn-red" id="confirm-btn">Yes, reset</button>
      </div>
    </div>

    <button class="sbtn sbtn-grey" id="reset-btn">Reset my streak</button>
  </div>

</div>

<div class="home-bar"><div class="home-pill"></div></div>

<script>
const KS='pwa_start',KL='pwa_log',KT='pwa_last';
let ticker=null;

function load(){
  try{return{start:localStorage.getItem(KS),log:JSON.parse(localStorage.getItem(KL)||'[]'),lastTs:parseInt(localStorage.getItem(KT)||'0')};}
  catch(e){return{start:null,log:[],lastTs:0};}
}
function save(s){
  try{localStorage.setItem(KS,s.start);localStorage.setItem(KL,JSON.stringify(s.log));localStorage.setItem(KT,String(s.lastTs));}catch(e){}
}
function msLeft(t){return Math.max(0,t+86400000-Date.now());}
function fmt(ms){const t=Math.floor(ms/1000),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function toDay(ts){const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function calcStreak(log){
  if(!log.length)return 0;
  const days=[...new Set(log.map(toDay))].sort();
  const td=toDay(Date.now()),yd=toDay(Date.now()-86400000);
  if(days[days.length-1]!==td&&days[days.length-1]!==yd)return 0;
  let streak=0,check=new Date(days[days.length-1]+'T12:00:00');
  for(let i=days.length-1;i>=0;i--){
    const d=new Date(days[i]+'T12:00:00');
    if(Math.abs(d-check)<129600000){streak++;check=new Date(d);check.setDate(check.getDate()-1);}else break;
  }
  return streak;
}
function fmtDT(ts){return new Date(ts).toLocaleString(undefined,{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});}
function stopTicker(){if(ticker){clearInterval(ticker);ticker=null;}}

function updateClock(){
  const now=new Date(),h=now.getHours()%12||12,m=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent=h+':'+m;
}
updateClock();setInterval(updateClock,10000);

function render(){
  const s=load();
  if(!s.start){
    document.getElementById('splash-screen').style.display='block';
    document.getElementById('main-screen').style.display='none';
    stopTicker();return;
  }
  document.getElementById('splash-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';

  const streak=calcStreak(s.log);
  document.getElementById('s-num').textContent=streak;
  document.getElementById('s-icon').textContent=streak>=14?'🔥':streak>=7?'✨':streak>=3?'⚡':'◆';
  document.getElementById('s-started').textContent='Started '+fmtDT(parseInt(s.start));

  const rem=msLeft(s.lastTs),canAdd=s.lastTs===0||rem<=0;
  const addBtn=document.getElementById('add-btn');

  if(canAdd){
    addBtn.className='sbtn sbtn-white';
    document.getElementById('s-status').className='status-pill pill-ready';
    document.getElementById('s-status').textContent='Ready — you can add one now';
    document.getElementById('s-locked').style.display='none';
    stopTicker();
  } else {
    addBtn.className='sbtn sbtn-locked';
    document.getElementById('s-status').className='status-pill pill-locked';
    document.getElementById('s-status').textContent='Already added — come back in:';
    document.getElementById('s-locked').style.display='block';
    document.getElementById('s-countdown').textContent=fmt(rem);
    document.getElementById('s-prog').style.width=(100-Math.floor((rem/86400000)*100))+'%';
    stopTicker();
    ticker=setInterval(function(){
      const r=msLeft(s.lastTs);
      if(r<=0){stopTicker();render();return;}
      document.getElementById('s-countdown').textContent=fmt(r);
      document.getElementById('s-prog').style.width=(100-Math.floor((r/86400000)*100))+'%';
    },1000);
  }

  const container=document.getElementById('s-dots');
  container.innerHTML='';
  const logDays=new Set(s.log.map(toDay));
  for(let i=29;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=toDay(d.getTime());
    if(s.start&&ds<toDay(parseInt(s.start)))continue;
    const dot=document.createElement('div');
    dot.className='dot'+(logDays.has(ds)?' done':'');
    dot.textContent=d.getDate();
    container.appendChild(dot);
  }
}

document.getElementById('start-btn').addEventListener('click',function(){
  const now=Date.now();
  save({start:String(now),log:[now],lastTs:now});
  render();
});
document.getElementById('add-btn').addEventListener('click',function(){
  const s=load();
  if(s.lastTs>0&&msLeft(s.lastTs)>0)return;
  const now=Date.now();s.log.push(now);s.lastTs=now;
  save(s);render();
});
document.getElementById('reset-btn').addEventListener('click',function(){
  document.getElementById('confirm-box').style.display='block';
  document.getElementById('reset-btn').style.display='none';
});
document.getElementById('cancel-btn').addEventListener('click',function(){
  document.getElementById('confirm-box').style.display='none';
  document.getElementById('reset-btn').style.display='block';
});
document.getElementById('confirm-btn').addEventListener('click',function(){
  try{localStorage.removeItem(KS);localStorage.removeItem(KL);localStorage.removeItem(KT);}catch(e){}
  stopTicker();
  document.getElementById('confirm-box').style.display='none';
  document.getElementById('reset-btn').style.display='block';
  render();
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

render();
</script>
</body>
</html>
