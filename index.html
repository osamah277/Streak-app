<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عادة</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  flex-direction:column;
  max-width:430px;
  margin:auto;
}

.app-header{
  text-align:center;
  padding:20px;
  font-size:20px;
  font-weight:bold;
  border-bottom:1px solid #222;
}

.card{
  background:#111;
  border-radius:16px;
  padding:16px;
  margin:16px;
}

.prayer-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.btn{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-green{
  background:#0d2e1a;
  color:#4caf7d;
}

.btn-grey{
  background:#333;
  color:#aaa;
}
</style>
</head>

<body>

<div class="app-header">عادة</div>

<div class="card">
  <div style="text-align:center;margin-bottom:10px;font-weight:bold;">🕌 Prayer Tracker</div>

  <div class="prayer-card">
    <span>Fajr</span>
    <button class="btn btn-green" onclick="togglePrayer(this)">Done</button>
  </div>

  <div class="prayer-card">
    <span>Dhuhr</span>
    <button class="btn btn-green" onclick="togglePrayer(this)">Done</button>
  </div>

  <div class="prayer-card">
    <span>Asr</span>
    <button class="btn btn-green" onclick="togglePrayer(this)">Done</button>
  </div>

  <div class="prayer-card">
    <span>Maghrib</span>
    <button class="btn btn-green" onclick="togglePrayer(this)">Done</button>
  </div>

  <div class="prayer-card">
    <span>Isha</span>
    <button class="btn btn-green" onclick="togglePrayer(this)">Done</button>
  </div>

</div>

<script>
function togglePrayer(btn){
  if(btn.classList.contains("btn-green")){
    btn.classList.remove("btn-green");
    btn.classList.add("btn-grey");
    btn.innerText = "Done ✓";
  } else {
    btn.classList.remove("btn-grey");
    btn.classList.add("btn-green");
    btn.innerText = "Done";
  }
}
</script>

</body>
</html>
